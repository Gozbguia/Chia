<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chia — Podcast Pitch Intelligence</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=JetBrains+Mono:wght@300;400;500&display=swap');
:root {
  --bg: #ffffff;
  --text: #111111;
  --surface: #f7f7f7;
  --surface2: #efefef;
  --surface3: #e6e6e6;
  --border: #e0e0e0;
  --border2: #cccccc;
  --accent: #7592f2;
  --accent-dim: rgba(117,146,242,0.08);
  --accent-border: rgba(117,146,242,0.35);
  --warn: #b87800;
  --danger: #c03030;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;font-size:14px;}

/* ── NAME SCREEN ── */
#nameScreen{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px;}
.chia-logo{font-family:'Playfair Display',serif;font-size:52px;font-weight:700;color:#111;letter-spacing:-0.03em;}
.chia-logo span{color:var(--accent);}
.chia-tag{font-size:12px;color:#888;letter-spacing:0.2em;text-transform:uppercase;}
.name-wrap{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;}
.name-label{font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:#888;}
.name-input{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:14px;color:#111;outline:none;transition:border-color 0.2s;}
.name-input:focus{border-color:var(--accent);}
.name-input::placeholder{color:#aaa;}
.main-btn{background:var(--accent);color:#fff;border:none;border-radius:6px;padding:11px 28px;font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:700;cursor:pointer;transition:opacity 0.2s;width:100%;}
.main-btn:hover{opacity:0.85;}

/* ── CLIENT SCREEN ── */
#clientScreen{flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;gap:24px;padding:40px;}
.client-welcome{font-size:15px;color:#555;}
.client-select-wrap{display:flex;flex-direction:column;gap:8px;width:100%;max-width:300px;}
.client-select-label{font-size:12px;letter-spacing:0.15em;text-transform:uppercase;color:#888;}
.client-dropdown{width:100%;background:var(--surface);border:1px solid var(--border2);border-radius:6px;padding:10px 14px;font-family:'JetBrains Mono',monospace;font-size:14px;color:#111;outline:none;cursor:pointer;appearance:none;transition:border-color 0.2s;}
.client-dropdown:focus{border-color:var(--accent);}
.client-dropdown option{background:#fff;color:#111;}

/* ── TOOL SCREEN ── */
#toolScreen{flex:1;display:none;flex-direction:column;}
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:100;flex-wrap:wrap;}
.tlogo{font-family:'Playfair Display',serif;font-size:19px;font-weight:700;color:#111;flex-shrink:0;}
.tlogo span{color:var(--accent);}
.back-btn{background:#fff;border:1px solid var(--border2);border-radius:4px;padding:5px 12px;font-size:12px;color:#555;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:500;transition:all 0.15s;}
.back-btn:hover{color:#111;border-color:#888;}
.client-badge{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:5px;padding:4px 10px;font-size:12px;color:#5572c8;font-weight:600;}
.angle-selector{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.angle-label{font-size:11px;color:#888;letter-spacing:0.1em;text-transform:uppercase;margin-right:2px;}
.angle-btn{background:#fff;border:1px solid var(--border2);border-radius:4px;padding:5px 12px;font-size:12px;color:#444;cursor:pointer;font-family:'JetBrains Mono',monospace;font-weight:500;line-height:1.4;transition:all 0.15s;}
.angle-btn:hover{color:#111;border-color:#888;background:var(--surface2);}
.angle-btn.active{background:var(--accent-dim);border-color:var(--accent);color:#3a52c0;font-weight:600;}
.input-area{display:flex;gap:7px;margin-left:auto;flex-shrink:0;}
.url-input{background:#fff;border:1px solid var(--border2);border-radius:5px;padding:7px 12px;font-family:'JetBrains Mono',monospace;font-size:12px;color:#111;width:240px;outline:none;transition:border-color 0.2s;}
.url-input:focus{border-color:var(--accent);}
.url-input::placeholder{color:#aaa;}
.research-btn{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:7px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;letter-spacing:0.04em;}
.research-btn:hover{opacity:0.85;}
.research-btn:disabled{opacity:0.35;cursor:not-allowed;}

/* ── LAYOUT ── */
.main{display:flex;flex:1;overflow:hidden;}

/* ── BRAIN PANEL ── */
.brain-panel{width:230px;border-right:1px solid var(--border);background:var(--surface);overflow-y:auto;flex-shrink:0;padding:14px;}
.panel-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#aaa;margin-bottom:10px;}
.ccm{background:#fff;border:1px solid var(--border);border-radius:7px;padding:11px;margin-bottom:10px;}
.ccm-name{font-size:15px;font-weight:700;color:#111;margin-bottom:3px;}
.ccm-role{font-size:11px;color:#777;line-height:1.55;margin-bottom:5px;}
.ccm-goal{font-size:11px;color:var(--accent);font-weight:600;}
.stats-row{display:flex;gap:6px;margin-bottom:10px;}
.stat-box{flex:1;background:#fff;border:1px solid var(--border);border-radius:5px;padding:8px 6px;text-align:center;}
.stat-num{font-size:17px;font-weight:700;color:#111;display:block;}
.stat-label{font-size:9px;color:#aaa;letter-spacing:0.1em;text-transform:uppercase;}
.bs{background:#fff;border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:8px;}
.bst{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#aaa;margin-bottom:7px;}
.bi{font-size:11px;color:#444;line-height:1.65;padding:2px 0;}
.bi strong{color:#111;}
.av{font-size:11px;color:var(--danger);line-height:1.65;padding:2px 0;}
.av::before{content:'✕  ';}
.angle-box{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:6px;padding:11px;margin-bottom:10px;}
.angle-box-title{font-size:9px;letter-spacing:0.15em;text-transform:uppercase;color:#7592f2;margin-bottom:6px;font-weight:700;}
.angle-box-text{font-size:11px;color:#333;line-height:1.7;}

/* ── CARDS AREA ── */
.cards-area{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:14px;background:var(--bg);}
.status-bar{display:flex;align-items:center;gap:9px;padding:10px 15px;background:var(--surface);border:1px solid var(--border);border-radius:6px;font-size:12px;color:#888;}
.pulse{width:7px;height:7px;border-radius:50%;background:var(--accent);animation:pulse 1.2s infinite;flex-shrink:0;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.rcard{background:#fff;border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeUp 0.4s ease both;box-shadow:0 2px 12px rgba(0,0,0,0.05);}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}

.guest-banner{background:#f4faeb;border-bottom:1px solid #c8e89a;padding:7px 15px;display:flex;align-items:center;gap:8px;font-size:11px;color:#3d7018;}
.connection-banner{background:#eef2ff;border-bottom:1px solid #c0ccf8;padding:7px 15px;display:flex;align-items:center;gap:8px;font-size:11px;color:#3050b8;}

.rcard-top{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;border-bottom:1px solid var(--border);}
.show-art{width:52px;height:52px;border-radius:7px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.show-meta{flex:1;min-width:0;}
.show-name{font-size:15px;font-weight:700;color:#111;margin-bottom:2px;}
.show-host{font-size:12px;color:#777;margin-bottom:6px;}
.social-row{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:5px;}
.social-chip{display:inline-flex;align-items:center;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:3px;padding:2px 7px;}
.social-chip-platform{font-size:10px;color:#999;letter-spacing:0.06em;}
.social-chip-followers{font-size:11px;color:#111;font-weight:600;}
.social-chip-na{font-size:11px;color:#999;}
.downloads-badge{display:inline-flex;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:3px;padding:3px 8px;font-size:11px;color:#5572c8;}
.fit-badge{padding:5px 11px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap;flex-shrink:0;}
.fit-strong{background:#edfaf0;border:1px solid #90d8a0;color:#1a6a30;}
.fit-possible{background:#fdf8e8;border:1px solid #d8c060;color:#8a6000;}
.fit-no{background:#fff0f0;border:1px solid #e0a0a0;color:#b02020;}

.sec{padding:12px 15px;border-bottom:1px solid var(--border);}
.sl{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:var(--accent);margin-bottom:7px;font-weight:600;}
.st{font-size:13px;line-height:1.75;color:#333;}
.st strong{color:#111;}
.ep-tag{display:inline-flex;align-items:center;gap:5px;background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:4px;padding:4px 10px;font-size:11px;color:#5572c8;margin-top:8px;}

.audience-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px;}
.audience-box{background:var(--surface);border:1px solid var(--border);border-radius:5px;padding:9px 10px;}
.audience-box-label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;font-weight:600;}
.audience-box-text{font-size:12px;color:#444;line-height:1.65;}

.diff-row{display:flex;gap:8px;margin-top:10px;}
.diff-box{flex:1;border-radius:5px;padding:9px 11px;}
.diff-same{background:var(--surface);border:1px solid var(--border);}
.diff-diff{background:#eef2ff;border:1px solid #c0ccf8;}
.diff-box-label{font-size:9px;letter-spacing:0.12em;text-transform:uppercase;color:#aaa;margin-bottom:5px;font-weight:600;}
.diff-box-text{font-size:12px;color:#333;line-height:1.6;}

.diff-verdict{border-radius:5px;padding:7px 11px;font-size:12px;font-weight:600;margin-top:9px;display:inline-flex;}
.verdict-now{background:#edfaf0;border:1px solid #90d8a0;color:#1a6a30;}
.verdict-wait{background:#fdf8e8;border:1px solid #d8c060;color:#8a6000;}
.verdict-angle{background:var(--accent-dim);border:1px solid var(--accent-border);color:#5572c8;}

.devil-section{background:#fff8f8;border-bottom:1px solid #f0d5d5;padding:12px 15px;}
.devil-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#b83030;margin-bottom:7px;font-weight:600;}
.devil-item{font-size:13px;color:#903030;line-height:1.7;padding:3px 0;display:flex;align-items:flex-start;gap:7px;}
.devil-item::before{content:'⚠';font-size:11px;flex-shrink:0;margin-top:2px;color:#c04040;}
.devil-note{font-size:12px;color:#999;margin-top:7px;font-style:italic;line-height:1.55;border-top:1px solid #f0d5d5;padding-top:7px;}

.pitch-section{background:var(--surface);padding:14px 15px;}
.psb{background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:3px;padding:2px 8px;font-size:11px;color:#5572c8;}
.pitch-edit-note{font-size:11px;color:#aaa;margin-bottom:7px;font-style:italic;}
.pitch-body{font-size:13px;line-height:1.85;color:#222;white-space:pre-wrap;outline:none;border:1px solid transparent;border-radius:5px;padding:8px;transition:border-color 0.2s;min-height:60px;}
.pitch-body:focus{border-color:var(--border2);background:#fff;}
.pitch-body .p{color:#5572c8;font-weight:500;}
.pitch-body a{color:#5572c8;text-decoration:underline;}

.copy-row{display:flex;gap:8px;margin-top:13px;flex-wrap:wrap;align-items:center;}
.btn-copy{background:#111;color:#fff;border:none;border-radius:5px;padding:9px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.btn-copy:hover{opacity:0.75;}
.btn-approve{background:var(--accent);color:#fff;border:none;border-radius:5px;padding:9px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;}
.btn-approve:hover{opacity:0.85;}

.sequence-section{background:#f4faf6;border:1px solid #a8d8b8;border-radius:7px;padding:14px 15px;margin-top:13px;}
.seq-label{font-size:10px;letter-spacing:0.2em;text-transform:uppercase;color:#2a7a40;margin-bottom:11px;font-weight:600;}
.seq-body{font-size:13px;line-height:1.85;color:#222;white-space:pre-wrap;outline:none;border:1px solid transparent;border-radius:4px;padding:5px;transition:border-color 0.2s;}
.seq-body:focus{border-color:#a8d8b8;}
.seq-body a{color:#5572c8;text-decoration:underline;}
.btn-copy-seq{background:#111;color:#fff;border:none;border-radius:5px;padding:9px 18px;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.2s;margin-top:11px;}
.btn-copy-seq:hover{opacity:0.75;}

.error-card{background:#fff8f8;border:1px solid #e8b0b0;border-radius:8px;padding:16px;color:#b03030;font-size:13px;line-height:1.7;}
.empty-state{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 20px;gap:6px;}
.ei{font-size:38px;margin-bottom:8px;opacity:0.3;}
.et{font-family:'Playfair Display',serif;font-size:19px;color:#111;opacity:0.35;}
.es{font-size:13px;color:#aaa;margin-top:5px;}
</style>
</head>
<body>

<!-- ── NAME SCREEN ── -->
<div id="nameScreen">
  <div class="chia-logo">Chi<span>a</span></div>
  <div class="chia-tag">Podcast Pitch Intelligence</div>
  <div class="name-wrap">
    <div class="name-label">Your name</div>
    <input id="writerName" class="name-input" type="text" placeholder="e.g. Gözde" onkeydown="if(event.key==='Enter')confirmName()">
  </div>
  <button class="main-btn" onclick="confirmName()">Enter Chia →</button>
</div>

<!-- ── CLIENT SCREEN ── -->
<div id="clientScreen">
  <div class="chia-logo">Chi<span>a</span></div>
  <div id="clientWelcome" class="client-welcome"></div>
  <div class="client-select-wrap">
    <div class="client-select-label">Select client</div>
    <select id="clientDropdown" class="client-dropdown">
      <option value="">— choose —</option>
      <option value="zach">Zach Brittle</option>
      <option value="kat">Kat Courtney</option>

  </div>

      <button id="researchBtn" class="research-btn" onclick="startResearch()">Research →</button>
    </div>
  </div>
  <div class="main">
    <div class="brain-panel" id="brainPanel">
      <div class="panel-label">Client Brain</div>
    </div>
    <div class="cards-area" id="cardsArea">
      <div class="empty-state" id="emptyState">
        <div class="ei" id="emptyIcon">🎙</div>
        <div class="et">Ready to research</div>
        <div class="es">Select an angle above, paste an Apple Podcasts URL, and hit Research →</div>
      </div>
    </div>
  </div>
</div>

<script>
let writerName = '';
let activeClient = null;
let activeAngle = null;
const cardData = {};

const MAKE_WEBHOOK = 'https://hook.eu2.make.com/cqx8prxomtaej0ugt7s19or79mhroghs';

const ANGLES = {

    {

  zach: {

  kat: {

    emoji: '🌿',
    badge: 'Kat Courtney · Plant Medicine People',
    angles: ANGLES.kat,
    brain: `
      <div class="ccm">
        <div class="ccm-name">Kat Courtney</div>
        <div class="ccm-role">Ayahuasquera · Huachumera · Death Doula · Founder, Plant Medicine People · Co-founder, Bassé</div>

        <div class="bi"><strong>First ceremony:</strong> Partner invited her to Peruvian jungle — said yes without knowing anything</div>
        <div class="bi"><strong>30 nights alone:</strong> Drank ayahuasca 30 consecutive nights alone — stability vs. intensity</div>
        <div class="bi"><strong>Death Doula:</strong> Lost her father — led to death doula training, bridges afterlife and plant medicine</div>
      </div>
      <div class="bs">
        <div class="bst">Avoid</div>
        <div class="av">Biohacking / shallow psychedelic hype framing</div>
        <div class="av">Colonizing or disrespectful indigenous narratives</div>
        <div class="av">Misogynistic or homophobic spaces</div>
      </div>`
  }
};

// ── SCREENS ──────────────────────────────────────────────────

function confirmName() {
  const n = document.getElementById('writerName').value.trim();
  if (!n) return;
  writerName = n;
  document.getElementById('nameScreen').style.display = 'none';
  document.getElementById('clientScreen').style.display = 'flex';
  document.getElementById('clientWelcome').textContent = `Welcome, ${n}. Who are you pitching today?`;
}

function goToTool() {
  const key = document.getElementById('clientDropdown').value;
  if (!key) return;
  selectClient(key);
}

function selectClient(key) {
  activeClient = key;
  const c = CLIENTS[key];

  // Badge
  document.getElementById('clientBadge').textContent = c.badge;

  // Angle buttons — auto-select first
  const sel = document.getElementById('angleSelector');
  sel.innerHTML = c.angles.map((a, i) =>
    `<button class="angle-btn${i === 0 ? ' active' : ''}" onclick="setAngle(this,'${a.id}')">${a.label}</button>`
  ).join('');
  activeAngle = c.angles[0].id;

  // Brain panel
  document.getElementById('brainPanel').innerHTML = `<div class="panel-label">Client Brain</div>${c.brain}`;
  updateAngleBox();

  // Cards area
  document.getElementById('emptyIcon').textContent = c.emoji;
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('urlInput').value = '';
  document.querySelectorAll('.rcard, .status-bar, .error-card').forEach(el => el.remove());

  document.getElementById('clientScreen').style.display = 'none';
  document.getElementById('toolScreen').style.display = 'flex';
}

function goBack() {
  document.getElementById('toolScreen').style.display = 'none';
  document.getElementById('clientScreen').style.display = 'flex';
  activeClient = null;
  activeAngle = null;
}

// ── ANGLES ───────────────────────────────────────────────────

function setAngle(btn, id) {
  activeAngle = id;
  document.querySelectorAll('.angle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateAngleBox();
}

function updateAngleBox() {
  const c = CLIENTS[activeClient];
  const angle = c.angles.find(a => a.id === activeAngle);
  if (!angle) return;
  const existing = document.getElementById('brainPanel').querySelector('.angle-box');
  if (existing) existing.remove();
  const box = document.createElement('div');
  box.className = 'angle-box';
  box.innerHTML = `<div class="angle-box-title">Active Angle</div><div class="angle-box-text">${angle.positioning}</div>`;
  document.getElementById('brainPanel').appendChild(box);
}

// ── RESEARCH ─────────────────────────────────────────────────

async function startResearch() {
  const url = document.getElementById('urlInput').value.trim();
  if (!url) { alert('Paste an Apple Podcasts link first.'); return; }

  const btn = document.getElementById('researchBtn');
  btn.disabled = true; btn.textContent = 'Researching…';

  document.getElementById('emptyState').style.display = 'none';
  document.querySelectorAll('.status-bar, .error-card').forEach(el => el.remove());

  const c = CLIENTS[activeClient];
  const angle = c.angles.find(a => a.id === activeAngle);

  const status = document.createElement('div');
  status.className = 'status-bar'; status.id = 'statusBar';
  status.innerHTML = `<div class="pulse"></div><span id="statusText">Sending to research engine…</span>`;
  document.getElementById('cardsArea').prepend(status);

  const steps = [
    'Fetching show data from iTunes…',
    'Identifying host and scanning episodes…',
    'Pulling social media follower counts…',
    'Building audience profile…',
    'Checking for previous episode coverage…',
    'Looking for personal connections…',
    'Running differentiation analysis…',
    'Running devil\'s advocate review…',
    `Generating pitch in ${writerName}'s voice…`
  ];
  let i = 0;
  const iv = setInterval(() => {
    const el = document.getElementById('statusText');
    if (el && i < steps.length) el.textContent = steps[i++];
  }, 3000);

  try {
    const response = await fetch(MAKE_WEBHOOK, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        apple_podcasts_url: url,
        client_name: c.name,
        selected_angle: angle ? angle.label : activeAngle,
        angle_positioning: angle ? angle.positioning : '',
        pitch_style: 'Intro Personalized',
        writer_name: writerName
      })
    });

    clearInterval(iv);
    document.getElementById('statusBar')?.remove();

    if (!response.ok) throw new Error(`Make returned ${response.status}`);

    const text = await response.text();
    let data;
    try {
      data = JSON.parse(text);
    } catch {
      // Make returned plain "Accepted" — treat as acknowledged, wait for callback
      data = { status: 'accepted' };
    }
    btn.disabled = false; btn.textContent = 'Research →';
    renderLiveCard(data);

  } catch (err) {
    clearInterval(iv);
    document.getElementById('statusBar')?.remove();
    btn.disabled = false; btn.textContent = 'Research →';

    const errEl = document.createElement('div');
    errEl.className = 'error-card';
    errEl.innerHTML = `<strong>Research failed</strong><br><br>Error: ${err.message}<br><br>Check that your Make scenario is turned ON and all modules are connected correctly.`;
    document.getElementById('cardsArea').prepend(errEl);
  }
}

// ── RENDER CARD ───────────────────────────────────────────────

function renderLiveCard(d) {
  const id = 'card_' + Date.now();

  // Store follow-ups by card ID to avoid inline escaping issues
  cardData[id] = {
    fu1: (d.follow_up_1 || '').replace(/\[W\]/g, writerName),
    fu2: (d.follow_up_2 || '').replace(/\[W\]/g, writerName)
  };

  const fitClass = d.fit_score === 'strong' ? 'fit-strong' : d.fit_score === 'possible' ? 'fit-possible' : 'fit-no';
  const fitLabel = d.fit_score === 'strong' ? 'Strong Fit' : d.fit_score === 'possible' ? 'Possible Fit' : 'Not a Fit';

  const guestBanner = d.guest_appeared_on_client_show
    ? `<div class="guest-banner">⭐ ${d.guest_appeared_note || 'Host has previously appeared on client show'}</div>` : '';
  const connBanner = d.personal_connection && d.personal_connection_link
    ? `<div class="connection-banner">🔗 Verified personal connection: ${d.personal_connection} <a href="${d.personal_connection_link}" target="_blank" style="color:#3050b8;margin-left:4px;">Verify →</a></div>` : '';

  const socialHtml = [d.social_instagram, d.social_twitter, d.social_website]
    .filter(Boolean)
    .map(s => `<div class="social-chip"><span class="social-chip-platform">${s.split(':')[0] || 'Social'}</span><span class="social-chip-followers">${s}</span></div>`)
    .join('');

  const dlHtml = d.downloads ? `<div class="downloads-badge">🎧 ${d.downloads}</div>` : '';

  const epTag = d.previous_episode_match
    ? `<div class="ep-tag">✅ ${d.previous_episode_match}</div>`
    : `<div class="ep-tag">⚡ No direct episode match — topic gap opportunity</div>`;

  const verdictClass = d.pitch_verdict === 'pitch now' ? 'verdict-now' : d.pitch_verdict === 'wait' ? 'verdict-wait' : 'verdict-angle';

  const devilItems = (d.devils_advocate || []).map(item => `<div class="devil-item">${item}</div>`).join('');

  const showPhrasesHtml = d.show_phrases && d.show_phrases.length
    ? `<div class="sec"><div class="sl">💬 Phrases from show description</div>
       <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px;">
         ${d.show_phrases.map(p => `<span style="background:var(--accent-dim);border:1px solid var(--accent-border);border-radius:3px;padding:3px 9px;font-size:12px;color:#5572c8;">"${p}"</span>`).join('')}
       </div></div>` : '';

  const formSection = d.is_contact_form
    ? `<div class="pitch-section">
        <div class="sl" style="margin-bottom:8px">📋 This show uses a contact form</div>
        <a href="${d.contact_form_url}" target="_blank" style="color:var(--accent);font-size:13px;">Open form →</a>
       </div>`
    : `<div class="pitch-section">
        <div class="sl" style="margin-bottom:5px">✍ Suggested Pitch — <span class="psb">${d.suggested_pitch_subject || ''}</span></div>
        <div class="pitch-edit-note">Click into the pitch to edit directly.</div>
        <div class="pitch-body" id="pb_${id}" contenteditable="true">${(d.suggested_pitch || '').replace(/\n/g, '<br>')}</div>
        <div class="copy-row">
          <button class="btn-copy" onclick="copyPitch('${id}')">⎘ Copy Pitch</button>
          <button class="btn-approve" onclick="approvePitch('${id}')">✓ Approve and Build Sequence</button>
        </div>
        <div id="seq_${id}"></div>
       </div>`;

  const el = document.createElement('div');
  el.className = 'rcard'; el.id = id;
  el.innerHTML = `
    ${guestBanner}${connBanner}
    <div class="rcard-top">
      <div class="show-art">🎙</div>
      <div class="show-meta">
        <div class="show-name">${d.show_name || 'Unknown Show'}</div>
        <div class="show-host">${d.host_name || ''}</div>
        <div class="social-row">${socialHtml}</div>
        ${dlHtml}
      </div>
      <div class="fit-badge ${fitClass}">✦ ${fitLabel}</div>
    </div>
    ${showPhrasesHtml}
    <div class="sec"><div class="sl">🎙 Host Profile</div><div class="st">${d.host_profile || ''}</div></div>
    <div class="sec">
      <div class="sl">👥 Audience</div>
      <div class="audience-grid">
        <div class="audience-box"><div class="audience-box-label">Who listens</div><div class="audience-box-text">${d.audience_who || ''}</div></div>
        <div class="audience-box"><div class="audience-box-label">What they need</div><div class="audience-box-text">${d.audience_needs || ''}</div></div>
        <div class="audience-box"><div class="audience-box-label">What they struggle with</div><div class="audience-box-text">${d.audience_struggles || ''}</div></div>
        <div class="audience-box"><div class="audience-box-label">Guest type that works</div><div class="audience-box-text">${d.audience_guest_type || ''}</div></div>
      </div>
    </div>
    <div class="sec">
      <div class="sl">🔍 Topic Coverage & Differentiation</div>
      <div class="st">${d.topic_gap || ''}</div>
      ${epTag}
      <div class="diff-row">
        <div class="diff-box diff-same"><div class="diff-box-label">Same as before</div><div class="diff-box-text">${d.differentiation_same || ''}</div></div>
        <div class="diff-box diff-diff"><div class="diff-box-label">What's different</div><div class="diff-box-text">${d.differentiation_different || ''}</div></div>
      </div>
      <div class="diff-verdict ${verdictClass}">${d.pitch_verdict_reason || d.pitch_verdict || ''}</div>
    </div>
    <div class="sec"><div class="sl">⚡ Why This Connection Works</div><div class="st">${d.personal_connection || ''}</div></div>
    <div class="devil-section">
      <div class="devil-label">⚠ Devil's Advocate — Read before writing</div>
      ${devilItems}
      <div class="devil-note">How to use this: ${d.devils_advocate_note || ''}</div>
    </div>
    ${formSection}`;

  document.getElementById('cardsArea').appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

// ── ACTIONS ───────────────────────────────────────────────────

function copyPitch(id) {
  const el = document.getElementById(`pb_${id}`);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).catch(() => {});
  const btn = document.getElementById(id).querySelector('.btn-copy');
  if (!btn) return;
  const orig = btn.textContent; btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = orig, 2000);
}

function approvePitch(id) {
  const pitch = document.getElementById(`pb_${id}`).innerText;
  const { fu1, fu2 } = cardData[id] || {};
  const seq = document.getElementById(`seq_${id}`);
  seq.innerHTML = `
    <div class="sequence-section">
      <div class="seq-label">Full Pitch Sequence — click to edit any section</div>
      <div class="seq-body" id="sb_${id}" contenteditable="true">PITCH 1 — INITIAL PITCH\n\n${pitch}\n\n---\n\nFOLLOW-UP 1\n\n${fu1 || ''}\n\n---\n\nFOLLOW-UP 2\n\n${fu2 || ''}</div>
      <button class="btn-copy-seq" onclick="copySeq('${id}')">⎘ Copy Full Sequence</button>
    </div>`;
  seq.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function copySeq(id) {
  const el = document.getElementById(`sb_${id}`);
  if (!el) return;
  navigator.clipboard.writeText(el.innerText).catch(() => {});
  const btn = document.getElementById(`seq_${id}`).querySelector('.btn-copy-seq');
  if (!btn) return;
  const orig = btn.textContent; btn.textContent = '✓ Copied!';
  setTimeout(() => btn.textContent = orig, 2000);
}
</script>
